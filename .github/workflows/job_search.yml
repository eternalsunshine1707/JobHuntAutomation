name: Job Hunt Automation

on:
  schedule:
    # Weekdays (Mon-Fri): 4 AM, 11 AM, 6 PM EST
    # EST = UTC-4, so: 8:00, 15:00, 22:00 UTC
    - cron: '0 8 * * 1-5'   # 4:00 AM EST
    - cron: '0 15 * * 1-5'  # 11:00 AM EST
    - cron: '0 22 * * 1-5'  # 6:00 PM EST
    # Weekends (Sat-Sun): 10 AM EST = 14:00 UTC
    - cron: '0 14 * * 0,6'  # 10:00 AM EST
  workflow_dispatch:  # Allows manual trigger

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore seen jobs and last run cache
        uses: actions/cache@v4
        with:
          path: |
            seen_jobs.json
            last_run.json
          key: pipeline-state-${{ github.run_id }}
          restore-keys: pipeline-state-

      - name: Run pipeline
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python main.py

      - name: Save cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            seen_jobs.json
            last_run.json
          key: pipeline-state-${{ github.run_id }}
