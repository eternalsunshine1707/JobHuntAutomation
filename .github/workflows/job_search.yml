name: Job Hunt Automation

on:
  schedule:
    # Weekdays (Mon-Fri): 5AM, 10AM, 2PM, 7PM EST
    # EST = UTC-4, so: 9:00, 14:00, 18:00, 23:00 UTC
    - cron: '0 9 * * 1-5'   # 5:00 AM EST (Mon-Fri)
    - cron: '0 14 * * 1-5'  # 10:00 AM EST (Mon-Fri)
    - cron: '0 18 * * 1-5'  # 2:00 PM EST (Mon-Fri)
    - cron: '0 23 * * 1-5'  # 7:00 PM EST (Mon-Fri)
    # Weekends (Sat-Sun): 9AM, 5PM EST
    - cron: '0 13 * * 0,6'  # 9:00 AM EST (Sat-Sun)
    - cron: '0 21 * * 0,6'  # 5:00 PM EST (Sat-Sun)
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Load seen jobs cache
        uses: actions/cache@v4
        with:
          path: seen_jobs.json
          key: seen-jobs-${{ github.run_id }}
          restore-keys: seen-jobs-

      - name: Run pipeline
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python main.py

      - name: Save seen jobs cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: seen_jobs.json
          key: seen-jobs-${{ github.run_id }}
