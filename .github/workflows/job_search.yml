name: Job Hunt Automation

on:
  schedule:
    # Runs every 4 hours: 8AM, 12PM, 4PM, 8PM, 12AM, 4AM ET
    # (GitHub Actions uses UTC, ET = UTC-4)
    - cron: '0 0,4,8,12,16,20 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Load seen jobs cache
        uses: actions/cache@v4
        with:
          path: seen_jobs.json
          key: seen-jobs-${{ github.run_id }}
          restore-keys: seen-jobs-

      - name: Run pipeline
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python main.py

      - name: Save seen jobs cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: seen_jobs.json
          key: seen-jobs-${{ github.run_id }}
